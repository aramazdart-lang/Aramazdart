<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Գրանցվել | Aramazd Art</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="auth-page">
  <div class="auth-card">
    <h1>Գրանցվել</h1>

    <input id="fullName" type="text" placeholder="Անուն Ազգանուն">
    <input id="phone" type="text" placeholder="Հեռախոսահամար">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Գաղտնաբառ">

    <button class="btn" onclick="registerUser()">Գրանցվել</button>

    <p>Արդեն ունե՞ք հաշիվ <a href="login.html">Մուտք գործել</a></p>
  </div>
</main>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://xxbvitnrnloscrrmlaui.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4_qeOASRgzI1mEpEioICow_hHSB5HPi';

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function registerUser(){
  const fullName = document.getElementById('fullName').value;
  const phone = document.getElementById('phone').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  if(!fullName || !phone || !email || !password){
    alert('Լրացրեք բոլոր դաշտերը');
    return;
  }

  const { data, error } = await client.auth.signUp({
    email,
    password
  });

  if(error){
    alert('Սխալ։ ' + error.message);
    return;
  }

  const userId = data.user?.id;

  if(userId){
    await client.from('profiles').insert([{
      id: userId,
      full_name: fullName,
      phone: phone
    }]);
  }

  alert('Գրանցումը հաջողվեց ✅');
  window.location.href = 'login.html';
}
</script>

</body>
</html>
